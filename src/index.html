<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Star Control</title>
    <link
      rel="stylesheet"
      href="/styles/main.css"
    />
    <link
      rel="stylesheet"
      href="/styles/titlebar.css"
    />
    <link
      rel="stylesheet"
      href="/styles/pages.css"
    />
  </head>
  <body>
    <div id="titlebar">
      <div
        id="titlebar-drag"
        data-tauri-drag-region
      >
        <span class="titlebar-title">Star Control</span>
      </div>
      <div class="titlebar-buttons">
        <button
          id="btn-minimize"
          class="titlebar-btn"
          aria-label="Minimize"
        >
          <svg
            width="12"
            height="12"
            viewBox="0 0 12 12"
          >
            <rect
              y="5"
              width="12"
              height="2"
              fill="currentColor"
            />
          </svg>
        </button>
        <button
          id="btn-maximize"
          class="titlebar-btn"
          aria-label="Maximize"
        >
          <svg
            width="12"
            height="12"
            viewBox="0 0 12 12"
          >
            <rect
              x="1"
              y="1"
              width="10"
              height="10"
              stroke="currentColor"
              stroke-width="1.5"
              fill="none"
            />
          </svg>
        </button>
        <button
          id="btn-close"
          class="titlebar-btn titlebar-btn-close"
          aria-label="Close"
        >
          <svg
            width="12"
            height="12"
            viewBox="0 0 12 12"
          >
            <path
              d="M1 1l10 10M11 1L1 11"
              stroke="currentColor"
              stroke-width="1.5"
            />
          </svg>
        </button>
      </div>
    </div>

    <div id="app">
      <nav id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand-icon">
            <div class="sidebar-brand-glow"></div>
            <img
              src="/assets/logos/StarControl-Transparent-Logo-Image.png"
              alt="Star Control"
            />
          </div>
        </div>
        <ul class="nav-links">
          <li>
            <a
              href="#"
              class="nav-link active"
              data-page="dashboard"
            >
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav-link"
              data-page="launch"
            >
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
              <span>Launch</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav-link"
              data-page="installation"
            >
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line
                  x1="12"
                  y1="15"
                  x2="12"
                  y2="3"
                />
              </svg>
              <span>Installation</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav-link"
              data-page="runners"
            >
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" />
              </svg>
              <span>Wine Runners</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav-link"
              data-page="profiles"
            >
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle
                  cx="12"
                  cy="7"
                  r="4"
                />
              </svg>
              <span>Profiles</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav-link"
              data-page="settings"
            >
              <svg
                class="nav-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle
                  cx="12"
                  cy="12"
                  r="3"
                />
                <path
                  d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                />
              </svg>
              <span>Settings</span>
            </a>
          </li>
        </ul>
        <div class="sidebar-footer">
          <a
            href="#"
            class="nav-link nav-link-footer"
            data-page="about"
          >
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
            <span>About</span>
          </a>
          <a
            href="#"
            class="nav-link nav-link-external"
            id="link-wiki"
          >
            <svg
              class="nav-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line
                x1="10"
                y1="14"
                x2="21"
                y2="3"
              />
            </svg>
            <span>LUG Wiki</span>
          </a>
          <span class="version">v0.1.6</span>
        </div>
      </nav>
      <main id="content"></main>
    </div>

    <script
      type="module"
      src="/main.js"
    ></script>
  </body>
</html>
