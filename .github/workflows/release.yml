name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev libsoup-3.0-dev libudev-dev jq \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build Tauri application
        env:
          CFLAGS: "-march=x86-64-v2 -mtune=generic -O2"
          CXXFLAGS: "-march=x86-64-v2 -mtune=generic -O2"
        run: cargo tauri build

      - name: Create portable tarball
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          BUNDLE_DIR="src-tauri/target/release/bundle"
          APPDIR="$BUNDLE_DIR/appimage/Star Control.AppDir"
          TARBALL_NAME="star-control_${VERSION}_amd64_portable"
          STAGING_DIR="$BUNDLE_DIR/$TARBALL_NAME"

          if [ ! -d "$APPDIR/usr" ]; then
            echo "ERROR: AppDir not found, cannot create portable tarball"
            exit 1
          fi

          mkdir -p "$STAGING_DIR"
          cp -a "$APPDIR/usr" "$STAGING_DIR/"
          for f in "$APPDIR"/*.desktop "$APPDIR"/*.png; do
            [ -e "$f" ] && cp -a "$f" "$STAGING_DIR/"
          done

          # Decode start.sh from base64
          echo '' | base64 -d > "$STAGING_DIR/start.sh"
          chmod +x "$STAGING_DIR/start.sh"

          tar czf "$BUNDLE_DIR/${TARBALL_NAME}.tar.gz" -C "$BUNDLE_DIR" "$TARBALL_NAME"
          rm -rf "$STAGING_DIR"
          echo "Portable tarball created: ${TARBALL_NAME}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*_portable.tar.gz
