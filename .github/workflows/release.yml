name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            jq

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build Tauri application
        env:
          CFLAGS: "-march=x86-64-v2 -mtune=generic -O2"
          CXXFLAGS: "-march=x86-64-v2 -mtune=generic -O2"
        run: cargo tauri build

      - name: Repack AppImage without GPU libs
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/appimage"
          APPIMAGE=$(ls "$BUNDLE_DIR"/*.AppImage)
          echo "Original AppImage: $APPIMAGE"

          # Extract
          chmod +x "$APPIMAGE"
          cd "$BUNDLE_DIR"
          "$APPIMAGE" --appimage-extract

          # Remove bundled EGL/Mesa/GPU libs that conflict with host drivers
          cd squashfs-root/usr/lib
          rm -vf libEGL*.so* libGLX*.so* libGLdispatch*.so* \
                 libgbm*.so* libdrm*.so* libxshmfence*.so* \
                 libvulkan*.so* 2>/dev/null || true
          cd "$BUNDLE_DIR"

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          # Repack (ARCH required for appimagetool)
          rm "$APPIMAGE"
          ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

          echo "Repacked AppImage: $(ls -lh "$APPIMAGE")"

      - name: Create portable tarball
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          BUNDLE_DIR="src-tauri/target/release/bundle"
          APPDIR="$BUNDLE_DIR/appimage/Star Control.AppDir"
          TARBALL_NAME="star-control_${VERSION}_amd64_portable"
          STAGING_DIR="$BUNDLE_DIR/$TARBALL_NAME"

          if [ ! -d "$APPDIR/usr" ]; then
            echo "ERROR: AppDir not found, cannot create portable tarball"
            exit 1
          fi

          mkdir -p "$STAGING_DIR"
          cp -a "$APPDIR/usr" "$STAGING_DIR/"
          for f in "$APPDIR"/*.desktop "$APPDIR"/*.png; do
            [ -e "$f" ] && cp -a "$f" "$STAGING_DIR/"
          done

          # Remove GPU libs from portable tarball too
          cd "$STAGING_DIR/usr/lib"
          rm -f libEGL*.so* libGLX*.so* libGLdispatch*.so* \
                libgbm*.so* libdrm*.so* libxshmfence*.so* \
                libvulkan*.so* 2>/dev/null || true
          cd "$BUNDLE_DIR"

          printf '%s\n' '#!/usr/bin/env bash' \
            'set -e' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'gsettings get org.gnome.desktop.interface gtk-theme 2>/dev/null | grep -qi "dark" \' \
            '  && GTK_THEME_VARIANT="dark" || GTK_THEME_VARIANT="light"' \
            'export LD_LIBRARY_PATH="$HERE/usr/lib:$HERE/usr/lib/x86_64-linux-gnu:$HERE/usr/lib64:$HERE/usr/lib32:$HERE/lib:$HERE/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"' \
            'export PATH="$HERE/usr/bin:$PATH"' \
            'export GTK_DATA_PREFIX="$HERE"' \
            'export GTK_THEME="${APPIMAGE_GTK_THEME:-Adwaita:$GTK_THEME_VARIANT}"' \
            'export GDK_BACKEND=x11' \
            'export XDG_DATA_DIRS="$HERE/usr/share:/usr/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"' \
            'export GSETTINGS_SCHEMA_DIR="$HERE/usr/share/glib-2.0/schemas"' \
            'export GTK_EXE_PREFIX="$HERE"' \
            'export GTK_PATH="$HERE/usr/lib/gtk-3.0:/usr/lib64/gtk-3.0:/usr/lib/x86_64-linux-gnu/gtk-3.0"' \
            'export GTK_IM_MODULE_FILE="$HERE/usr/lib/gtk-3.0/3.0.0/immodules.cache"' \
            'export GDK_PIXBUF_MODULE_FILE="$HERE/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"' \
            'export GIO_EXTRA_MODULES="$HERE/usr/lib/gio/modules"' \
            'cd "$HERE/usr"' \
            'exec "$HERE/usr/bin/star-control" "$@"' \
            > "$STAGING_DIR/start.sh"
          chmod +x "$STAGING_DIR/start.sh"

          tar czf "$BUNDLE_DIR/${TARBALL_NAME}.tar.gz" -C "$BUNDLE_DIR" "$TARBALL_NAME"
          rm -rf "$STAGING_DIR"
          echo "Portable tarball created: ${TARBALL_NAME}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*_portable.tar.gz
